---
layout: default
header_style: solid
---

<!-- ***** Page Content Start ***** -->
<section class="section page-content-section" id="content">
    <div class="container">
        <div class="row">
            <div class="col-lg-12">
                <div class="section-heading">
                    {% if page.subtitle %}<p class="section-subtitle">{{ page.subtitle }}</p>{% endif %}
                    <h1>{{ page.heading | default: page.title }}</h1>
                </div>
            </div>
        </div>
        
        {{ content }}
    </div>
</section>
<!-- ***** Page Content End ***** -->
