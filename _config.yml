# Site Settings
title: "Njoki Muriithi Portfolio"
description: "Portfolio of Njoki Muriithi - Environmental Scientist and GIS Specialist"
author: "Njoki Muriithi"
email: "njokimuriithi@alumni.trentu.ca"
baseurl: "/nmuriithi-portfolio.github.io" # Repository name for GitHub Pages project sites
url: "https://njoki-muriithi.github.io"
lang: "en"

# Supabase Configuration (auth via GitHub OAuth)
supabase_url: "https://zoyhplmjvkjvdyqcuryg.supabase.co"
supabase_anon_key: "sb_publishable_4nfcFXu2DbVBeIRjgjQnhw_FvAQyoX1"

# GitHub API Configuration (for admin panel content management)
github_owner: "njoki-muriithi"
github_repo: "nmuriithi-portfolio.github.io"
github_branch: "main"

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: pretty

# Plugins (GitHub Pages supported)
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/
  publications:
    output: true
    permalink: /publications/:name/

# Default Front Matter
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
      type: "publications"
    values:
      layout: "project"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
  - package.json
  - package-lock.json
  - playwright.config.ts
  - tests
  - test-results
  - playwright-report
  - openspec
